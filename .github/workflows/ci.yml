name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install bundle dependencies
        working-directory: src/marpx/extract_slides_js
        run: npm ci --no-audit --no-fund
      - name: Rebuild extract bundle
        working-directory: src/marpx/extract_slides_js
        run: npm run build
      - name: Verify extract bundle is up to date
        run: git diff --exit-code -- src/marpx/extract_slides.bundle.js

  test:
    needs: bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync
      - name: Install Playwright browsers
        run: uv run playwright install --with-deps chromium
      - name: Install librsvg
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin
      - name: Run tests
        run: uv run pytest tests/ -x -q

  lint:
    needs: bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv sync
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format check
        run: uv run ruff format --check src/ tests/
